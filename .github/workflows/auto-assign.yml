name: "Auto Assign Reviewers"
on:
  pull_request_target:
    types: [opened, ready_for_review, synchronize]

permissions:
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Request reviewers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Запрашиваем ревью у обоих пользователей
          gh pr edit $PR_NUMBER --add-reviewer YuriSilenok --repo $REPO
          gh pr edit $PR_NUMBER --add-reviewer CatJAM223 --repo $REPO
          gh pr edit $PR_NUMBER --add-reviewer Andrey-hehe --repo $REPO
          
          # Оставляем только одного (если нужно)
          # GitHub сам выберет одного, если указать несколько
